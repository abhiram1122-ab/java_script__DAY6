<!DOCTYPE html>
<html>
<body>

<h2>POST Method Example</h2>
<button onclick="sendData()">Send Data</button>

<script>
function sendData() {
    fetch("https://jsonplaceholder.typicode.com/posts", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            title: "Hello",
            body: "This is POST request",
            userId: 1
        })
    })
    .then(response => response.json())
    .then(data => {
        console.log(data);
        document.body.innerHTML += "<p>Data Sent Successfully</p>";
    })
    .catch(error => console.log(error));
}
</script>

</body>
</html>
